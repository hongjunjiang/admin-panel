<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>代理面板</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#08111f;
    --panel:rgba(15,23,42,.88);
    --panel-2:#101c33;
    --line:#22324f;
    --text:#e7eefb;
    --muted:#93a6c7;
    --brand:#4cc9ff;
    --brand-2:#2563eb;
    --ok:#2dd4bf;
    --warn:#f59e0b;
    --bad:#ef4444;
  }
  body{
    min-height:100vh;
    color:var(--text);
    font-family:"Microsoft YaHei",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
    background:
      radial-gradient(circle at top left, rgba(76,201,255,.18), transparent 30%),
      radial-gradient(circle at top right, rgba(37,99,235,.18), transparent 35%),
      linear-gradient(180deg,#09111f 0%,#07101c 100%);
    padding:18px 18px 96px;
  }
  .wrap{max-width:1100px;margin:0 auto}
  .hero,.card{
    background:var(--panel);
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 20px 60px rgba(0,0,0,.24);
    backdrop-filter:blur(14px);
    border-radius:20px;
  }
  .hero{
    padding:24px;
    margin-bottom:16px;
    background:
      linear-gradient(135deg, rgba(76,201,255,.16), rgba(255,255,255,.04)),
      var(--panel);
  }
  .hero h1{font-size:28px;letter-spacing:.04em;margin-bottom:8px}
  .hero p{color:var(--muted);line-height:1.7}
  .layout{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
  .stack{display:grid;gap:16px}
  .card{padding:18px}
  .title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .title small{color:var(--muted);font-weight:400}
  .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
  .stat{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px;
  }
  .stat .val{font-size:24px;font-weight:800;color:var(--brand)}
  .stat .label{font-size:12px;color:var(--muted);margin-top:6px}
  .permission{
    display:grid;
    gap:10px;
  }
  .permission-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:14px;
    background:var(--panel-2);
  }
  .permission-row .name{font-weight:700}
  .permission-row .value{color:#9be7ff;font-family:Consolas,monospace}
  label{display:block;margin:10px 0 6px;color:var(--muted);font-size:13px}
  input,textarea,button{
    width:100%;
    border:none;
    border-radius:12px;
    font:inherit;
  }
  input,textarea{
    background:#0b1426;
    color:var(--text);
    border:1px solid var(--line);
    padding:12px 14px;
    outline:none;
  }
  input:focus,textarea:focus{border-color:rgba(76,201,255,.7);box-shadow:0 0 0 3px rgba(76,201,255,.12)}
  textarea{min-height:92px;resize:vertical}
  .row{display:flex;gap:10px}
  .row > *{flex:1}
  .btn-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:12px}
  button{
    padding:12px 14px;
    font-weight:800;
    cursor:pointer;
    background:linear-gradient(135deg,var(--brand),var(--brand-2));
    color:#fff;
  }
  button.secondary{background:#18253f;color:var(--text)}
  button:disabled{opacity:.6;cursor:not-allowed}
  .hint{margin-top:8px;color:var(--muted);font-size:12px;line-height:1.6}
  .result{
    display:none;
    margin-top:12px;
    padding:12px 14px;
    border-radius:14px;
    background:#0b1426;
    border:1px solid var(--line);
    line-height:1.7;
    word-break:break-all;
  }
  .result.show{display:block}
  .result.ok{border-color:rgba(45,212,191,.45)}
  .result.bad{border-color:rgba(239,68,68,.45)}
  .code{font-family:Consolas,monospace;color:#9be7ff}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap}
  .toolbar button{flex:1 1 140px}
  .list{display:grid;gap:10px}
  .item{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px;
  }
  .item-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
  .badge{
    padding:4px 8px;
    border-radius:999px;
    font-size:12px;
    white-space:nowrap;
  }
  .ok-badge{background:rgba(45,212,191,.15);color:#6ee7d8}
  .wait-badge{background:rgba(245,158,11,.15);color:#fbd38d}
  .muted{color:var(--muted)}
  .footer{
    position:fixed;
    left:0;right:0;bottom:0;
    padding:12px 18px calc(12px + env(safe-area-inset-bottom));
    background:rgba(7,16,28,.92);
    backdrop-filter:blur(14px);
    border-top:1px solid rgba(255,255,255,.08);
  }
  .footer .wrap{display:flex;gap:10px}
  .footer .wrap button{flex:1}
  @media (max-width: 900px){
    .layout{grid-template-columns:1fr}
  }
  @media (max-width: 640px){
    .grid{grid-template-columns:1fr 1fr}
    .row{flex-direction:column}
    .btn-row{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>代理面板</h1>
    <p>登录后可按权限执行三类操作：试用、转正式、续费。页面只负责代理动作，不提供管理员改期能力。</p>
  </section>

  <div class="layout">
    <div class="stack">
      <section class="card">
        <div class="title">登录 <small id="loginHint">当前未登录</small></div>
        <label for="agentKey">代理密钥</label>
        <input id="agentKey" placeholder="AG-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
        <div class="toolbar" style="margin-top:12px;">
          <button id="loginBtn" onclick="login()">登录</button>
          <button class="secondary" onclick="logout()">退出</button>
        </div>
      </section>

      <section class="card">
        <div class="title">数据概览</div>
        <div class="grid">
          <div class="stat"><div class="val" id="todayCreated">-</div><div class="label">今日已操作</div></div>
          <div class="stat"><div class="val" id="remainingToday">-</div><div class="label">今日剩余额度</div></div>
          <div class="stat"><div class="val" id="totalUsers">-</div><div class="label">总用户数</div></div>
          <div class="stat"><div class="val" id="activatedUsers">-</div><div class="label">已激活用户</div></div>
          <div class="stat"><div class="val" id="renewedUsers">-</div><div class="label">续费用户</div></div>
        </div>
      </section>

      <section class="card">
        <div class="title">权限说明</div>
        <div class="permission">
          <div class="permission-row"><span class="name">试用</span><span class="value" id="trialLimit">-</span></div>
          <div class="permission-row"><span class="name">转正式</span><span class="value" id="formalLimit">-</span></div>
          <div class="permission-row"><span class="name">续费</span><span class="value" id="renewLimit">-</span></div>
        </div>
      </section>
    </div>

    <div class="stack">
      <section class="card">
        <div class="title">代理操作</div>
        <label for="productCode">产品码</label>
        <input id="productCode" maxlength="20" placeholder="20位数字">
        <div class="row">
          <div>
            <label for="days">天数</label>
            <input id="days" type="number" min="1" placeholder="留空则按当前动作上限">
          </div>
          <div>
            <label for="note">备注</label>
            <input id="note" placeholder="客户备注">
          </div>
        </div>
        <div class="btn-row">
          <button onclick="issue('trial')">创建试用</button>
          <button onclick="issue('formal')">转正式</button>
          <button onclick="issue('renew')">用户续费</button>
        </div>
        <div class="hint" id="actionHint">试用固定 1 天；转正式和续费默认 30 天，后台允许的话最多可上浮到 35 天。</div>
        <div class="result" id="actionResult"></div>
      </section>

      <section class="card">
        <div class="title">我的用户</div>
        <label for="userSearch" style="margin-top:0;">搜索用户</label>
        <input id="userSearch" placeholder="搜索产品码、备注或动作..." oninput="filterUsers()">
        <div class="toolbar">
          <button class="secondary" onclick="loadUsers()">刷新列表</button>
        </div>
        <div style="margin-top:12px;" class="list" id="userList"></div>
      </section>
    </div>
  </div>
</div>

<div class="footer">
  <div class="wrap">
    <button onclick="refreshAll()">刷新全部</button>
  </div>
</div>

<script>
const SERVER_URL = 'https://1319543272-jztmvsq313.ap-guangzhou.tencentscf.com';
const STORAGE_KEY = 'agent_panel_key';
let currentAgent = null;
let currentLicenses = [];

function $(id) {
  return document.getElementById(id);
}

function setText(id, value) {
  $(id).textContent = value;
}

function getAgentKey() {
  return $('agentKey').value.trim();
}

function saveKey(key) {
  localStorage.setItem(STORAGE_KEY, key);
  $('agentKey').value = key;
}

function showResult(ok, html) {
  const el = $('actionResult');
  el.className = 'result show ' + (ok ? 'ok' : 'bad');
  el.innerHTML = html;
}

function formatDays(value) {
  if (value === null || value === undefined || value === '') return '-';
  return String(value).includes('h') ? String(value).replace('h', '小时') : value;
}

function filterUsers() {
  renderUserList(currentLicenses, $('userSearch').value.trim().toLowerCase());
}

async function api(path, body = {}) {
  const key = getAgentKey();
  const resp = await fetch(SERVER_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Agent-Key': key,
    },
    body: JSON.stringify({ ...body, path }),
  });
  const result = await resp.json();
  if (result.body) {
    return JSON.parse(result.body);
  }
  return result;
}

function applyStats(stats) {
  setText('todayCreated', stats.today_created ?? 0);
  setText('remainingToday', stats.remaining_today ?? 0);
  setText('totalUsers', stats.total_users ?? 0);
  setText('activatedUsers', stats.activated_users ?? 0);
  setText('renewedUsers', stats.renewed_users ?? 0);
}

function applyPermissions(agent) {
  const trialMax = Number(agent.trial_days ?? 1) || 0;
  const formalMax = Number(agent.formal_days ?? 30) || 0;
  const renewMax = Number(agent.renew_days ?? 30) || 0;
  setText('trialLimit', trialMax > 0 ? '固定 1 天' : '未开放');
  setText('formalLimit', formalMax >= 30 ? (formalMax > 30 ? `默认 30 天，上限 ${formalMax} 天` : '默认 30 天') : '未开放');
  setText('renewLimit', renewMax >= 30 ? (renewMax > 30 ? `默认 30 天，上限 ${renewMax} 天` : '默认 30 天') : '未开放');
  const canTrial = trialMax > 0;
  const canFormal = formalMax >= 30;
  const canRenew = renewMax >= 30;
  $('actionHint').textContent = [
    canTrial ? '试用固定 1 天' : '未开放试用',
    canFormal ? `转正式默认 30 天${formalMax > 30 ? `，最多 ${formalMax} 天` : ''}` : '未开放转正式',
    canRenew ? `续费默认 30 天${renewMax > 30 ? `，最多 ${renewMax} 天` : ''}` : '未开放续费'
  ].join('，');
}

async function login() {
  const key = getAgentKey();
  if (!key) {
    $('loginHint').textContent = '请先输入代理密钥';
    return;
  }

  const result = await api('/agent/login');
  if (result.code !== 200) {
    $('loginHint').textContent = result.message || '登录失败';
    return;
  }

  saveKey(key);
  currentAgent = result.data.agent || {};
  $('loginHint').textContent = `已登录：${currentAgent.agent_name || '-'}（ID=${currentAgent.agent_id || '-'}）`;
  applyStats(result.data.stats || {});
  applyPermissions(currentAgent);
  await loadUsers();
}

function logout() {
  localStorage.removeItem(STORAGE_KEY);
  $('agentKey').value = '';
  $('userSearch').value = '';
  currentAgent = null;
  currentLicenses = [];
  $('loginHint').textContent = '当前未登录';
  ['todayCreated', 'remainingToday', 'totalUsers', 'activatedUsers', 'renewedUsers', 'trialLimit', 'formalLimit', 'renewLimit'].forEach(id => setText(id, '-'));
  $('userList').innerHTML = '<div class="item"><div class="muted">已退出登录</div></div>';
  $('actionResult').className = 'result';
  $('actionResult').innerHTML = '';
}

async function issue(action) {
  const productCode = $('productCode').value.replace(/\D/g, '');
  let days = parseInt($('days').value || '0', 10);
  const note = $('note').value.trim();

  if (productCode.length !== 20) {
    showResult(false, '产品码必须是 20 位数字');
    return;
  }

  const limit = currentAgent ? Number(currentAgent[`${action}_days`] ?? currentAgent.max_days ?? 0) : 0;
  const defaultDays = action === 'trial' ? 1 : 30;
  if (!limit || limit <= 0) {
    showResult(false, `${action} 权限未开放`);
    return;
  }
  if (!days || days <= 0) {
    days = defaultDays;
  }
  if (limit > 0 && days > limit) {
    showResult(false, `当前${action}操作最多只能做 ${limit} 天`);
    return;
  }

  const result = await api('/agent/create', {
    product_code: productCode,
    days,
    note,
    action,
  });

  if (result.code !== 200) {
    showResult(false, result.message || '操作失败');
    return;
  }

  const data = result.data || {};
  showResult(true, `
    操作成功<br>
    动作：<span class="code">${data.action || action}</span><br>
    产品码：<span class="code">${data.product_code}</span><br>
    激活码：<span class="code">${data.activation_code || '-'}</span><br>
    天数：${data.days}<br>
    到期：${data.expire_date || '-'}<br>
    代理ID：${data.agent_id || '-'}${data.existing ? '<br>说明：已在原记录上更新' : ''}
  `);

  $('productCode').value = '';
  $('note').value = '';
  await refreshAll();
}

async function loadUsers() {
  const list = $('userList');
  list.innerHTML = '<div class="item"><div class="muted">加载中...</div></div>';

  const result = await api('/agent/list');
  if (result.code !== 200) {
    list.innerHTML = `<div class="item"><div class="muted">${result.message || '加载失败'}</div></div>`;
    return;
  }

  applyStats(result.data.stats || {});
  currentLicenses = result.data.licenses || [];
  renderUserList(currentLicenses, $('userSearch').value.trim().toLowerCase());
}

function renderUserList(licenses, query = '') {
  const list = $('userList');
  const filtered = query
    ? licenses.filter(item => {
        const text = [
          item.product_code || '',
          item.note || '',
          item.grant_type || item.action || '',
          item.expire_date || '',
        ].join(' ').toLowerCase();
        return text.includes(query);
      })
    : licenses;

  if (!filtered.length) {
    list.innerHTML = '<div class="item"><div class="muted">暂无匹配用户</div></div>';
    return;
  }

  list.innerHTML = filtered.map(item => {
    const badge = item.activated
      ? '<span class="badge ok-badge">已激活</span>'
      : '<span class="badge wait-badge">未激活</span>';
    const action = item.grant_type || item.action || 'trial';
    return `
      <div class="item">
        <div class="item-top">
          <div class="code">${item.product_code}</div>
          ${badge}
        </div>
        <div class="muted">动作：${action}</div>
        <div class="muted">到期：${item.expire_date}</div>
        <div class="muted">剩余：${formatDays(item.days_left)}</div>
        <div class="muted">今日用量：${item.today_used}/${item.daily_limit}</div>
        <div class="muted">备注：${item.note || '-'}</div>
      </div>
    `;
  }).join('');
}

async function refreshAll() {
  const result = await api('/agent/stats');
  if (result.code === 200) {
    currentAgent = result.data.agent || currentAgent;
    if (currentAgent) {
      $('loginHint').textContent = `已登录：${currentAgent.agent_name || '-'}（ID=${currentAgent.agent_id || '-'}）`;
      applyPermissions(currentAgent);
    }
    applyStats(result.data.stats || {});
  }
  await loadUsers();
}

(function init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    $('agentKey').value = saved;
    login();
  } else {
    $('userList').innerHTML = '<div class="item"><div class="muted">登录后可查看自己的用户记录</div></div>';
  }
})();
</script>
</body>
</html>
